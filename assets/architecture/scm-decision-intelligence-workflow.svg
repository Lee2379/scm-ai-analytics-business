<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1660" viewBox="0 0 1400 1660" role="img" aria-labelledby="title desc">
  <title id="title">End-to-end SCM business and data science workflow</title>
  <desc id="desc">A vertical architecture workflow with six red-accented stages from the business problem to governed data, demand intelligence, inventory decisions, policy evaluation, and decision delivery.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#7a0010" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e60012"/>
    </marker>
    <style>
      .eyebrow { font: 700 20px Inter, Segoe UI, Arial, sans-serif; fill: #e60012; letter-spacing: 2.5px; }
      .headline { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #171717; letter-spacing: -0.5px; }
      .intro { font: 400 23px Inter, Segoe UI, Arial, sans-serif; fill: #555555; }
      .step { font: 700 21px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .node-title { font: 700 31px Inter, Segoe UI, Arial, sans-serif; fill: #171717; }
      .node-copy { font: 400 23px Inter, Segoe UI, Arial, sans-serif; fill: #444444; }
      .node-accent { font: 700 21px Inter, Segoe UI, Arial, sans-serif; fill: #c90012; }
      .final-title { font: 700 31px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .final-copy { font: 400 23px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #e60012; stroke-width: 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="1660" fill="#ffffff"/>

  <text x="90" y="70" class="eyebrow">SYSTEM ARCHITECTURE</text>
  <text x="90" y="125" class="headline">End-to-End SCM Decision Intelligence Workflow</text>
  <text x="90" y="173" class="intro">The system connects an operational inventory problem to governed data, auditable analytics,</text>
  <text x="90" y="208" class="intro">offline business evaluation, and a multilingual decision-support experience.</text>
  <line x1="90" y1="245" x2="1310" y2="245" stroke="#e7e7e7" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="220" y="285" width="960" height="175" rx="10" fill="#fff4f5" stroke="#e60012" stroke-width="4"/>
    <circle cx="285" cy="342" r="31" fill="#e60012"/>
    <text x="285" y="350" text-anchor="middle" class="step">1</text>
    <text x="340" y="344" class="node-title">Business Problem</text>
    <text x="340" y="387" class="node-copy">Prevent stockouts without creating excess inventory</text>
    <text x="340" y="425" class="node-accent">Decision grain · SKU × store × planning horizon</text>
  </g>

  <path d="M 700 460 L 700 525" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="220" y="535" width="960" height="175" rx="10" fill="#fff4f5" stroke="#e60012" stroke-width="4"/>
    <circle cx="285" cy="592" r="31" fill="#e60012"/>
    <text x="285" y="600" text-anchor="middle" class="step">2</text>
    <text x="340" y="594" class="node-title">Governed SCM Data Foundation</text>
    <text x="340" y="637" class="node-copy">Sales · calendar · weather · inventory · supply policy</text>
    <text x="340" y="675" class="node-accent">Synthetic, reproducible, and free of customer-level PII</text>
  </g>

  <path d="M 700 710 L 700 775" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="220" y="785" width="960" height="175" rx="10" fill="#fff4f5" stroke="#e60012" stroke-width="4"/>
    <circle cx="285" cy="842" r="31" fill="#e60012"/>
    <text x="285" y="850" text-anchor="middle" class="step">3</text>
    <text x="340" y="844" class="node-title">Demand Intelligence</text>
    <text x="340" y="887" class="node-copy">28-day SKU-store forecast · drivers · confidence · exceptions</text>
    <text x="340" y="925" class="node-accent">Transparent weekday seasonality + bounded recent trend</text>
  </g>

  <path d="M 700 960 L 700 1025" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="220" y="1035" width="960" height="175" rx="10" fill="#fff4f5" stroke="#e60012" stroke-width="4"/>
    <circle cx="285" cy="1092" r="31" fill="#e60012"/>
    <text x="285" y="1100" text-anchor="middle" class="step">4</text>
    <text x="340" y="1094" class="node-title">Inventory Decision Engine</text>
    <text x="340" y="1137" class="node-copy">Safety stock · ROP · replenishment ranking · store transfers</text>
    <text x="340" y="1175" class="node-accent">Action quantity + priority + plain-language rationale</text>
  </g>

  <path d="M 700 1210 L 700 1275" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="220" y="1285" width="960" height="175" rx="10" fill="#fff4f5" stroke="#e60012" stroke-width="4"/>
    <circle cx="285" cy="1342" r="31" fill="#e60012"/>
    <text x="285" y="1350" text-anchor="middle" class="step">5</text>
    <text x="340" y="1344" class="node-title">Offline Policy Evaluation</text>
    <text x="340" y="1387" class="node-copy">Planner baseline vs constrained AI-assisted candidate</text>
    <text x="340" y="1425" class="node-accent">Stockout · service level · total cost · paired statistical tests</text>
  </g>

  <path d="M 700 1460 L 700 1525" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="220" y="1535" width="960" height="100" rx="10" fill="#e60012" stroke="#e60012" stroke-width="4"/>
    <text x="700" y="1581" text-anchor="middle" class="final-title">Decision Delivery</text>
    <text x="700" y="1618" text-anchor="middle" class="final-copy">Streamlit workspace · grounded SCM Copilot · English · 日本語 · 한국어</text>
  </g>
</svg>
